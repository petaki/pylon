name: tests

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Test
        run: go test -v -race ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1.4.0
        with:
          version: '2026.1'
          install-go: false

      - name: Build
        run: make

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
